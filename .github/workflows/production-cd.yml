name: Blind-Match CD Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/BlindMatch.API/BlindMatch.API.csproj

    - name: Build
      run: dotnet build src/BlindMatch.API/BlindMatch.API.csproj --no-restore --configuration Release

    # Publish as framework-dependent (Azure App Service has the runtime)
    # This produces a much smaller package and avoids win-x86 mismatch errors
    - name: Publish API
      run: dotnet publish src/BlindMatch.API/BlindMatch.API.csproj -c Release -o ./publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: "blindmatch-ekf5hng6echxdbar"
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: "./publish"
