name: Blind-Match CD Production

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-net@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/BlindMatch.API/BlindMatch.API.csproj

    - name: Build
      run: dotnet build src/BlindMatch.API/BlindMatch.API.csproj --no-restore

    # 🔥 MANDATORY TEST GATE (If this fails, the workflow STOPS here)
    - name: Run Tests
      run: dotnet test src/BlindMatch.API/BlindMatch.API.csproj --configuration Release

  docker-validation:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 🔥 DOCKER BUILD VALIDATION
    - name: Build Docker API Image
      run: docker build -t blindmatch-api:v1.${{ github.run_number }} ./src -f ./src/BlindMatch.API/Dockerfile

    - name: Build Docker Frontend Image
      run: docker build -t blindmatch-frontend:v1.${{ github.run_number }} ./client -f ./client/Dockerfile

  deploy-to-azure-staging:
    needs: docker-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Azure Web App (Staging Slot)
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'blindmatch-api'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        slot-name: 'staging'
        package: './publish' # In a real workflow, this would be the output of the build stage
        
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 🔥 SLOT SWAP (STAGING -> PRODUCTION)
    - name: Swap Staging to Production
      run: |
        az webapp deployment slot swap --resource-group BlindMatch_RG --name blindmatch-api --slot staging --target-slot production
